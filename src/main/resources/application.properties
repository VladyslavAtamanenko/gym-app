spring.application.name=gym-app

# JWT — secret must be Base64-encoded, at least 256 bits; expiration in milliseconds
app.jwt.expiration-ms=3600000
app.bcrypt.strength=12
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.profiles.active=local

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=Gym Application
info.app.description=Gym management REST API
